quarkus.wiremock.devservices.files-mapping=src/test/resources

downstream.url=http://localhost:${quarkus.wiremock.devservices.port}

# Named oidc-client backing the client-credentials scheme (points at the WireMock token endpoint)
quarkus.oidc-client.demo.auth-server-url=http://localhost:${quarkus.wiremock.devservices.port}
quarkus.oidc-client.demo.discovery-enabled=false
quarkus.oidc-client.demo.token-path=/oidc/token
quarkus.oidc-client.demo.client-id=flow-client
quarkus.oidc-client.demo.credentials.secret=flow-secret
quarkus.oidc-client.demo.grant.type=client

# Flow OIDC: scheme 'propagation' referenced by the task via FuncDSL.use("propagation").
# token-propagation-enabled forwards the subject token (supplied here via workflow input).
quarkus.flow.oidc.auth.propagation.token-propagation-enabled=true

# Flow OIDC: scheme 'cc' referenced by the task via FuncDSL.use("cc").
# No subject token + no propagation -> AuthConfigResolver derives client-credentials.
quarkus.flow.oidc.auth.cc.oidc-client-name=demo

quarkus.flow.oidc.auth."subject-from-dsl".oidc-client-name=demo

# Disable Keycloak (we are using WireMock)
quarkus.keycloak.devservices.enabled=false

quarkus.http.test-port=0