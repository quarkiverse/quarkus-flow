quarkus.flow.oidc.enabled=true

# Keep the test hermetic: WireMock stubs the authorization server, so no Keycloak Dev Services container.
quarkus.keycloak.devservices.enabled=false
quarkus.oidc-client.devservices.enabled=false

# WireMock dev services serve the stubs under src/test/resources/{mappings,__files}
quarkus.wiremock.devservices.files-mapping=src/test/resources
wiremock.url=http://localhost:${quarkus.wiremock.devservices.port}

# Authorization server (token endpoint) and the protected downstream service
auth.base-url=${wiremock.url}
image.service.url=${wiremock.url}/image-service/images
scoped.image.service.url=${wiremock.url}/scoped-image-service/images
endpoint.image.service.url=${wiremock.url}/endpoint-image-service/images
