document:
  dsl: '1.0.0-alpha1'
  namespace: test
  name: oauth2-workflow
  version: '1.0.0'
do:
  - callApi:
      call: http
      with:
        method: get
        endpoint:
          uri: https://api.example.com/data
          authentication:
            oauth2:
              authority: http://localhost:8089
              grant: client_credentials
              client:
                id: test-client
                secret: test-secret
              endpoints:
                token: /oauth2/token
