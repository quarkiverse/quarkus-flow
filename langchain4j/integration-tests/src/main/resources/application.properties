quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.flyway.enabled=true
quarkus.flyway.migrate-at-start=true

# Disable auto-restore for tests to prevent pollution from previous test runs
quarkus.flow.persistence.auto-restore=false

# Debug logging for workflow execution
quarkus.log.category."io.quarkiverse.flow".level=DEBUG
quarkus.log.category."io.quarkiverse.flow.tracing".level=INFO

# LangChain4j HTTP client logging
quarkus.log.category."io.quarkiverse.langchain4j.jaxrsclient".level=DEBUG
quarkus.log.category."dev.langchain4j.model.ollama".level=DEBUG
quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG
quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=DEBUG

# LangChain4j request/response logging
quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# H2 by default
quarkus.datasource.db-kind=h2
quarkus.flyway.locations=db/migration/h2

# H2 profile (explicit)
%h2.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DATABASE_TO_UPPER=false

# MySQL
%mysql.quarkus.datasource.db-kind=mysql
%mysql.quarkus.flyway.locations=db/migration/mysql

# PostgreSQL
%postgresql.quarkus.datasource.db-kind=postgresql
%postgresql.quarkus.flyway.locations=db/migration/postgresql

# Oracle
%oracle.quarkus.datasource.db-kind=oracle
%oracle.quarkus.flyway.locations=db/migration/oracle
