# Test-only configuration
# Note: Each test class uses QuarkusTestProfile to set unique MVStore db-path

# Enable messaging defaults for tests (only for EmitEventWorkflowTest)
quarkus.flow.messaging.defaults-enabled=true

# In-memory messaging configuration for testing
mp.messaging.incoming.flow-in.connector=smallrye-in-memory
mp.messaging.incoming.flow-in.topic=flow-in
mp.messaging.outgoing.flow-out.connector=smallrye-in-memory
mp.messaging.outgoing.flow-out.topic=flow-out

# Use random port to avoid conflicts
quarkus.http.test-port=0