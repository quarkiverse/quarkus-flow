# ============================================================================
# Container Profile - Shared Configuration for All Docker Image Variants
# ============================================================================
# This profile is activated for all Docker images (minimal, standard, messaging)
# via QUARKUS_PROFILE=container,{variant}
# ============================================================================

# ----------------------------------------------------------------------------
# Workflow Loading
# ----------------------------------------------------------------------------
# Path to workflow definition files (.yaml, .yml, .json)
# Mount your workflows directory here via docker-compose or Kubernetes volume
#
# Docker Compose: -v ./workflows:/deployments/workflows:ro
# Kubernetes: ConfigMap or PersistentVolume mounted at /deployments/workflows
#
# The runner scans this directory recursively for workflow files at startup
quarkus.flow.runner.source.path=/deployments/workflows

# ----------------------------------------------------------------------------
# Database Schema Management (JPA variants only)
# ----------------------------------------------------------------------------
# Auto-update database schema on startup (standard & messaging variants)
# Creates/updates tables for workflow instance persistence
# Safe for development and production (only adds new columns/tables, never drops)
quarkus.hibernate-orm.database.generation=update