# ============================================================================
# Development Mode Profile
# ============================================================================
# Activated when running: mvn quarkus:dev or make dev
#
# This profile configures the runner for local development with:
#   - MVStore persistence (file-based, no external database needed)
#   - Workflows loaded from project directory
#   - Dev UI enabled at http://localhost:8080/q/dev
# ============================================================================

# ----------------------------------------------------------------------------
# HTTP Configuration
# ----------------------------------------------------------------------------
# Bind to localhost only (not accessible from outside the development machine)
quarkus.http.host=localhost

# ----------------------------------------------------------------------------
# Dev Services
# ----------------------------------------------------------------------------
# Disable Kubernetes Dev Services (not needed for local development)
quarkus.kubernetes-client.devservices.enabled=false

# ----------------------------------------------------------------------------
# Persistence - MVStore
# ----------------------------------------------------------------------------
# Store workflow instances in target directory (cleaned by mvn clean)
quarkus.flow.persistence.mvstore.db-path=target/flowRunnerData.mv

# ----------------------------------------------------------------------------
# Workflow Loading
# ----------------------------------------------------------------------------
# Load workflows from the workflows/ directory in project root
# ${user.dir} resolves to the directory where Maven/Quarkus runs (project root)
#
# When using "make dev" from runner/app:
#   - Command: cd ../.. && mvn quarkus:dev -pl runner/app -am
#   - Working directory: /path/to/quarkus-flow (project root)
#   - Workflows loaded from: /path/to/quarkus-flow/workflows
#
# Add your workflow YAML files to the workflows/ directory and they'll be
# automatically loaded on startup. Changes require a restart (not hot-reloaded).
quarkus.flow.runner.source.path=${user.dir}/workflows