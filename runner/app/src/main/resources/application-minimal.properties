# ============================================================================
# Minimal Variant Profile
# ============================================================================
# Activated via QUARKUS_PROFILE=container,minimal
#
# Characteristics:
#   - Persistence: MVStore (file-based, single-replica only)
#   - Messaging: None
#   - HA/Failover: Not supported
#   - Image Size: ~120MB
# ============================================================================

# ----------------------------------------------------------------------------
# MVStore Persistence
# ----------------------------------------------------------------------------
# File path for MVStore database (workflow instance state)
# Directory /deployments/data is created in Dockerfile and owned by user 185
#
# For production: mount a persistent volume at /deployments/data
# For testing: container storage (lost on restart)
#
# IMPORTANT: MVStore is file-based and does NOT support multiple replicas
#            Use standard or messaging variants for HA deployments
quarkus.flow.persistence.mvstore.db-path=/deployments/data/flowRunnerData.mv
