# Quarkus Flow Runner Application
# Pre-built Docker image configuration

# Application name
quarkus.application.name=quarkus-flow-runner

# HTTP configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# OpenAPI/Swagger UI
quarkus.swagger-ui.always-include=true

# Logging
quarkus.flow.structured-logging.enabled=true
quarkus.flow.structured-logging.handler.mode=container
quarkus.flow.structured-logging.timestamp-format=epoch-seconds
quarkus.flow.structured-logging.events=workflow.*
quarkus.flow.structured-logging.include-workflow-payloads=false
quarkus.flow.structured-logging.include-task-payloads=false

# Persistence
## MVStore
# Include hostname in db-path to support multiple pods on shared PVC (Kubernetes)
# In K8s, HOSTNAME env var contains the unique pod name
quarkus.flow.persistence.mvstore.db-path=${FLOW_RUNNER_DATA_PATH:./data/flowRunnerData-${HOSTNAME:local}.mv}
