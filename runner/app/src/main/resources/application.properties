# ============================================================================
# Quarkus Flow Runner - Pre-built Docker Image Configuration
# ============================================================================
# This is the base configuration for all image variants (minimal, standard, messaging).
# Variant-specific settings are in application-{variant}.properties files.
#
# Documentation: https://docs.quarkiverse.io/quarkus-flow/dev/runner.html
# ============================================================================

# ----------------------------------------------------------------------------
# Application Identity
# ----------------------------------------------------------------------------
quarkus.application.name=quarkus-flow-runner

# ----------------------------------------------------------------------------
# HTTP Configuration
# ----------------------------------------------------------------------------
# Port and host for the REST API and dashboard
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# ----------------------------------------------------------------------------
# OpenAPI & Swagger UI
# ----------------------------------------------------------------------------
# Always include Swagger UI for workflow API documentation
# Access at: http://localhost:8080/q/swagger-ui
quarkus.swagger-ui.always-include=true

# Expand each workflow definition as a separate operation in OpenAPI
# This creates concrete endpoints like POST /q/flow/exec/{namespace}/{name}/{version}
# Set to false to only show the generic parameterized endpoint
quarkus.flow.runner.openapi.expand-workflows=true

# ----------------------------------------------------------------------------
# Structured Logging
# ----------------------------------------------------------------------------
# Enable structured JSON logging for workflow events
quarkus.flow.structured-logging.enabled=true

# Container mode optimizes for stdout/stderr logging (no file output)
quarkus.flow.structured-logging.handler.mode=container

# Use epoch seconds for timestamps (Grafana/Loki friendly)
quarkus.flow.structured-logging.timestamp-format=epoch-seconds

# Log all workflow lifecycle events (workflow.started, workflow.completed, etc.)
quarkus.flow.structured-logging.events=workflow.*

# Don't include workflow input/output payloads in logs (sensitive data protection)
# Set to true for debugging, but be aware of data sensitivity
quarkus.flow.structured-logging.include-workflow-payloads=false
quarkus.flow.structured-logging.include-task-payloads=false

# ----------------------------------------------------------------------------
# Persistence - Default (Build-time requirement)
# ----------------------------------------------------------------------------
# This is overridden by variant-specific profiles (minimal, standard, messaging)
# Set here to satisfy build-time requirements
quarkus.flow.persistence.mvstore.db-path=target/flowRunnerData.mv

# ----------------------------------------------------------------------------
# Profile-specific Configurations
# ----------------------------------------------------------------------------
# Runtime configurations are loaded from:
#   - application-container.properties (all Docker variants)
#   - application-minimal.properties (minimal variant)
#   - application-messaging.properties (messaging variant)
#   - application-dev.properties (local development)
#
# Profiles are activated via QUARKUS_PROFILE environment variable
# Docker images use: QUARKUS_PROFILE=container,{minimal|standard|messaging}
# ----------------------------------------------------------------------------
