# ============================================================================
# Standard Variant Profile
# ============================================================================
# Activated via QUARKUS_PROFILE=container,standard
#
# Characteristics:
#   - Persistence: JPA with PostgreSQL (HA-ready with shared database)
#   - Messaging: None (use messaging variant for Kafka)
#   - HA/Failover: Supported (with durable-kubernetes module)
#   - Image Size: ~280MB
# ============================================================================

quarkus.flow.durable.kube.pool.name=flow-runner-standard

# ----------------------------------------------------------------------------
# JPA Persistence
# ----------------------------------------------------------------------------
# PostgreSQL connection settings (configure via environment variables at runtime)
#
# Required environment variables when running the container:
#   QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/flowdb
#   QUARKUS_DATASOURCE_USERNAME=flowuser
#   QUARKUS_DATASOURCE_PASSWORD=flowpass
#
# Database schema is auto-created/updated via:
#   quarkus.hibernate-orm.database.generation=update
# (configured in application-container.properties)
#
# For production: use managed PostgreSQL (RDS, Cloud SQL, Azure Database, etc.)
# For HA: ensure shared database is accessible by all runner replicas
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# Durable Kubernetes (HA/Failover)
# ----------------------------------------------------------------------------
# The durable-kubernetes module is included in this variant.
# It provides:
#   - Lease-based coordination between runner replicas
#   - Automatic failover when a pod dies
#   - Workflow sharding across replicas
#
# Configuration is automatic - no properties needed here.
# Each pod acquires a stable lease name (e.g., flow-pool-member-00)
# and processes workflows sharded to that lease.
#
# See: https://docs.quarkiverse.io/quarkus-flow/dev/persistence.html
# ----------------------------------------------------------------------------
