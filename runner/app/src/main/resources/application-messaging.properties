# ============================================================================
# Messaging Variant Profile
# ============================================================================
# Activated via QUARKUS_PROFILE=container,messaging
#
# Characteristics:
#   - Persistence: JPA with PostgreSQL (configure via QUARKUS_DATASOURCE_* env vars)
#   - Messaging: Kafka (CloudEvents via SmallRye Reactive Messaging)
#   - HA/Failover: Supported (with durable-kubernetes module)
#   - Image Size: ~330MB
# ============================================================================

# ----------------------------------------------------------------------------
# Flow Messaging Integration
# ----------------------------------------------------------------------------
# Enable default Kafka channels for workflow execution
# Allows workflows to be triggered via Kafka messages and emit results to Kafka
quarkus.flow.messaging.defaults-enabled=true

# ----------------------------------------------------------------------------
# Kafka Consumer - Incoming Workflow Execution Requests
# ----------------------------------------------------------------------------
# Channel: flow-in
# Format: CloudEvents (application/cloudevents+json)
# Trigger workflow execution by sending CloudEvents to this topic
mp.messaging.incoming.flow-in.connector=smallrye-kafka
mp.messaging.incoming.flow-in.topic=flow-in
mp.messaging.incoming.flow-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.flow-in.value.deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer

# ----------------------------------------------------------------------------
# Kafka Producer - Outgoing Workflow Execution Results
# ----------------------------------------------------------------------------
# Channel: flow-out
# Format: CloudEvents (application/cloudevents+json)
# Workflow results are emitted as CloudEvents to this topic
mp.messaging.outgoing.flow-out.connector=smallrye-kafka
mp.messaging.outgoing.flow-out.topic=flow-out
mp.messaging.outgoing.flow-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.flow-out.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer

# ----------------------------------------------------------------------------
# Kafka Connection (Required at Runtime)
# ----------------------------------------------------------------------------
# Set KAFKA_BOOTSTRAP_SERVERS environment variable when running the container:
#   docker run -e KAFKA_BOOTSTRAP_SERVERS=kafka:9092 ...
#
# The bootstrap servers are auto-configured via environment variable.
# See: https://quarkus.io/guides/kafka#kafka-configuration-resolution
# ----------------------------------------------------------------------------
