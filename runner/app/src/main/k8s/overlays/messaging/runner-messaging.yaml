---
# Optional: Create a ConfigMap with custom application.properties
# Users can override any default settings by mounting this to /deployments/config
#
# Example:
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: runner-custom-config
#   namespace: quarkus-flow
# data:
#   application.properties: |
#     quarkus.log.level=DEBUG
#     kafka.bootstrap.servers=my-kafka-cluster:9092
#     mp.messaging.outgoing.flow-out.topic=custom-events
---
apiVersion: v1
kind: Secret
metadata:
  name: runner-messaging-secret
  namespace: quarkus-flow
type: Opaque
stringData:
  QUARKUS_DATASOURCE_PASSWORD: "flowpass"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quarkus-flow-runner-messaging
  namespace: quarkus-flow
  labels:
    app: quarkus-flow-runner
    variant: messaging
spec:
  # HA setup: 3 replicas with durable-kubernetes for automatic failover
  replicas: 3
  # Rolling update strategy: kill 1 pod before starting new one to release lease
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: quarkus-flow-runner
      variant: messaging
  template:
    metadata:
      labels:
        app: quarkus-flow-runner
        variant: messaging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
    spec:
      # Service account for Kubernetes API access (durable-kubernetes lease management)
      serviceAccountName: quarkus-flow-runner
      containers:
        - name: runner
          image: quay.io/quarkiverse/quarkus-flow-runner:${project.version}-messaging
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # Database connection (required for JPA)
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgresql:5432/flowdb"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "flowuser"
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: runner-messaging-secret
                  key: QUARKUS_DATASOURCE_PASSWORD
            # Kafka connection (required for messaging)
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            # Pod identity for durable-kubernetes (Downward API)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            # Example workflow (automatically created by kustomize)
            - name: workflow-example
              mountPath: /deployments/workflows/example-workflow.yaml
              subPath: example-workflow.yaml
              readOnly: true
            # Add more workflows here:
            # - name: workflow-myapp
            #   mountPath: /deployments/workflows/myworkflow.yaml
            #   subPath: myworkflow.yaml
            #   readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        # Example workflow (automatically created by kustomize)
        - name: workflow-example
          configMap:
            name: workflow-example
        # Add more workflows here:
        # - name: workflow-myapp
        #   configMap:
        #     name: workflow-myapp
---
apiVersion: v1
kind: Service
metadata:
  name: quarkus-flow-runner-messaging
  namespace: quarkus-flow
  labels:
    app: quarkus-flow-runner
    variant: messaging
spec:
  selector:
    app: quarkus-flow-runner
    variant: messaging
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
