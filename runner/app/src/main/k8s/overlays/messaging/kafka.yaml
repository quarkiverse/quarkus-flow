---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: quarkus-flow
  labels:
    app: zookeeper
spec:
  ports:
    - name: client
      port: 2181
      targetPort: 2181
  selector:
    app: zookeeper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: quarkus-flow
  labels:
    app: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: quay.io/strimzi/kafka:latest-kafka-3.6.0
          command:
            - sh
            - -c
            - bin/zookeeper-server-start.sh config/zookeeper.properties
          ports:
            - containerPort: 2181
              name: client
          env:
            - name: LOG_DIR
              value: /tmp/logs
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: quarkus-flow
  labels:
    app: kafka
spec:
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: quarkus-flow
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: quay.io/strimzi/kafka:latest-kafka-3.6.0
          command:
            - sh
            - -c
            - >-
              export KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 &&
              bin/kafka-server-start.sh config/server.properties
              --override listeners=PLAINTEXT://0.0.0.0:9092
              --override advertised.listeners=PLAINTEXT://kafka:9092
              --override zookeeper.connect=zookeeper:2181
              --override num.network.threads=3
              --override num.io.threads=8
              --override socket.send.buffer.bytes=102400
              --override socket.receive.buffer.bytes=102400
              --override socket.request.max.bytes=104857600
              --override log.dirs=/tmp/kafka-logs
              --override num.partitions=1
              --override num.recovery.threads.per.data.dir=1
              --override offsets.topic.replication.factor=1
              --override transaction.state.log.replication.factor=1
              --override transaction.state.log.min.isr=1
              --override log.retention.hours=168
              --override log.segment.bytes=1073741824
              --override log.retention.check.interval.ms=300000
          ports:
            - containerPort: 9092
              name: kafka
          env:
            - name: LOG_DIR
              value: /tmp/logs
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 5
