name: Quarkus Platform Nightly

on:
  schedule:
    # Run every night at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  quarkus-platform-build:
    name: Quarkus Platform Build (JDK 21)
    runs-on: ubuntu-latest
    outputs:
      build_outcome: ${{ steps.platform-build.outcome }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      
      - name: Build Quarkus Flow SNAPSHOT
        run: mvn -B clean install -T 15C -Dno-format -DskipTests -DskipITs=true -Dquarkus.log.level=OFF -ntp

      - name: Run Quarkus Flow tests in Quarkus Platform with the SNAPSHOT
        id: platform-build
        continue-on-error: true
        run: mvn -B clean install -T 15C -f quarkus-platform-checks/pom.xml -Pquarkus-platform-build-and-test -Dno-format -Dquarkus.log.level=OFF -ntp

      - name: Publish Failed Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          check_name: "JUnit Test Report (Quarkus Platform Nightly)"
          report_paths: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
          include_passed: false
          detailed_summary: true
          annotate_only: true

      - name: Fail the workflow if platform build failed
        if: steps.platform-build.outcome == 'failure'
        run: exit 1

  track-issue:
    name: Track Issue
    needs: quarkus-platform-build
    if: always()
    uses: ./.github/workflows/issue-tracker.yml
    with:
      build_outcome: ${{ needs.quarkus-platform-build.outputs.build_outcome }}
      issue_label: 'quarkus-platform-nightly'
      issue_title: '🔴 Quarkus Platform Build Failure'
      failure_description: 'Quarkus Platform build'
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      team_mention: '@quarkiverse/quarkiverse-flow-triage'