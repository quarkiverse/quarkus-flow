name: "Quarkus ecosystem CI"
on:
  workflow_dispatch:
  watch:
    types: [started]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build against Quarkus from main
    if: github.event_name == 'workflow_dispatch' || github.actor == 'quarkusbot' || github.actor == 'quarkiversebot'
    uses: quarkiverse/.github/.github/workflows/quarkus-ecosystem-ci.yml@main
    secrets: inherit
    with:
      ecosystem_ci_repo_path: quarkiverse-flow
      java_version: 17
      quarkus_version_pom_property: 'quarkus.version'
  lts:
    uses: quarkiverse/.github/.github/workflows/quarkus-ecosystem-ci.yml@main
    secrets: inherit
    with:
      ecosystem_ci_repo_path: quarkiverse-flow
      alternative: ${{ matrix.version }}
      java_version: 17
    strategy:
      matrix:
        version: ['3.33']
    name: "Build ${{ matrix.version }} against Quarkus latest ${{ matrix.version }}"
      