name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ ".gitignore", "CODEOWNERS", "LICENSE", "**.md", "**.adoc", "**.txt", ".all-contributorsrc", ".github/project.yml", ".claude/**" ]
  pull_request:
    paths-ignore: [ ".gitignore", "CODEOWNERS", "LICENSE", "**.md", "**.adoc", "**.txt", ".all-contributorsrc", ".claude/**" ]

permissions:
  contents: read
  pull-requests: read

env:
  # RestAssured socket timeout for slow GHA runners (in milliseconds)
  RESTASSURED_TIMEOUT_MS: 60000

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Quick validation (formatting & doc generation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run build to validate formatting and generate docs (core only)
        run: mvn -B clean install -T 1C -P!docs -DskipTests -DskipITs=true -Dquarkus.log.level=OFF -Dquarkus.langchain4j.ollama.devservices.enabled=false -ntp

      - name: Upload core artifacts for examples-it
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-flow-core-jdk17-${{ github.sha }}
          path: ~/.m2/repository/io/quarkiverse/flow/
          retention-days: 1
          compression-level: 6

      - name: Check for uncommitted changes
        id: check-changes
        run: |
          if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "::warning::Build generated uncommitted changes"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Show what changed
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          echo "::error::❌ The build modified files that weren't committed!"
          echo ""
          echo "Modified files:"
          git status --short
          echo ""
          echo "This usually means:"
          echo ""
          echo "1. **Code formatting issues**"
          echo "   The formatter automatically fixed formatting violations."
          echo ""
          echo "2. **Missing generated documentation**"
          echo "   Config reference docs were regenerated from @ConfigRoot classes."
          echo ""
          echo "🔧 How to fix:"
          echo "   Run locally: mvn clean install -DskipTests"
          echo "   Review and commit the changes"
          echo "   Push again"
          echo ""
          echo "💡 Tip: Always run 'mvn clean install -DskipTests' before pushing."
          echo ""
          echo "Diff of changes:"
          git diff
          exit 1

  build:
    name: Build & test (${{ matrix.os }} / JDK ${{ matrix.java-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java-version: [ 17, 21, 25 ]
        exclude:
          # Windows: Only test JDK 17 (examples already skipped, core tested on Linux for all JDKs)
          - os: windows-latest
            java-version: 21
          - os: windows-latest
            java-version: 25

    steps:
      - name: Prepare git (CRLF)
        if: matrix.os == 'windows-latest'
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build with Maven (Linux, skip docs and examples)
        if: matrix.os == 'ubuntu-latest'
        run: mvn -B clean install -T 1C -Dno-format -P!docs -DskipITs=true -Dquarkus.log.level=OFF -Dquarkus.langchain4j.ollama.devservices.enabled=false -Drestassured.config.http.client.params.SO_TIMEOUT=${{ env.RESTASSURED_TIMEOUT_MS }} -ntp

      - name: Build with Maven (Windows, skip docs and examples)
        if: matrix.os == 'windows-latest'
        run: mvn -B clean install -Dno-format -P!docs -DskipITs=true -Dquarkus.log.level=OFF -Dquarkus.langchain4j.ollama.devservices.enabled=false -ntp

  examples-it:
    name: Examples IT (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - name: Prepare git (CRLF)
        if: matrix.os == 'windows-latest'
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Download core artifacts
        uses: actions/download-artifact@v8
        with:
          name: quarkus-flow-core-jdk17-${{ github.sha }}
          path: ~/.m2/repository/io/quarkiverse/flow/

      - name: Run examples integration tests
        working-directory: examples
        run: mvn -B install -Dno-format -DskipITs=false -Dquarkus.log.level=OFF -Dquarkus.langchain4j.ollama.devservices.enabled=false -Drestassured.config.http.client.params.SO_TIMEOUT=${{ env.RESTASSURED_TIMEOUT_MS }} -ntp
