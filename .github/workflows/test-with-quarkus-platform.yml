name: Build with Quarkus Platform

on:
  pull_request:
    paths-ignore: [ ".gitignore", "CODEOWNERS", "LICENSE", "**.md", "**.adoc", "**.txt", ".all-contributorsrc" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build and test Quarkus Platform with the changes (${{ matrix.os }} / JDK ${{ matrix.java-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        java-version: [ 21 ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build Quarkus Flow SNAPSHOT with the PR changes
        if: matrix.os == 'ubuntu-latest'
        run: mvn -B clean install -Dno-format -DskipTests -Dquarkus.log.level=OFF -ntp

      - name: Run Quarkus Flow tests in Quarkus Platform with the SNAPSHOT built with the PR changes
        if: matrix.os == 'windows-latest'
        run: mvn -B clean install -f quarkus-platform-checks/pom.xml -Pquarkus-platform-build-and-test -Dno-format -Dquarkus.log.level=OFF -ntp

      - name: Publish Failed Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          check_name: "Quarkus Platform JUnit Test Report (${{ matrix.os }} / JDK ${{ matrix.java-version }})"
          report_paths: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
          include_passed: false
          detailed_summary: true
          annotate_only: true
