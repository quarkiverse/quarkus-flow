name: Persistent Workflows with Langchain4J

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ ".gitignore", "CODEOWNERS", "LICENSE", "**.md", "**.adoc", "**.txt", ".all-contributorsrc", ".github/project.yml", ".claude/**" ]
  pull_request:
    paths-ignore: [ ".gitignore", "CODEOWNERS", "LICENSE", "**.md", "**.adoc", "**.txt", ".all-contributorsrc", ".claude/**" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  persistence-jpa:
    name: Persistence JPA (${{ matrix.kind }})
    runs-on: ubuntu-latest
    strategy:
      # Keep every database leg running even if one fails, so a single engine
      # regression doesn't mask the others.
      fail-fast: false
      matrix:
        kind: [ h2, postgresql, mysql, oracle ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build dependency modules (no tests)
        run: |
          mvn -B install \
            -pl langchain4j/integration-tests -am \
            -DskipTests -DskipITs \
            -ntp

      - name: Run persistence integration tests (${{ matrix.kind }})
        run: |
          if [ "${{ matrix.kind }}" = "h2" ]; then
            # H2 is the default config in application.properties, so
            # neither -Ddb nor a test profile is needed.
            DB_ARGS=""
          else
            DB_ARGS="-Ddb=${{ matrix.kind }} -Dquarkus.test.profile=${{ matrix.kind }}"
          fi
          mvn -B verify \
            -pl langchain4j/integration-tests \
            $DB_ARGS \
            -DskipITs=false \
            -Dquarkus.log.level=OFF \
            -Dquarkus.profile=${{ matrix.kind }} \
            -Dquarkus.langchain4j.ollama.devservices.enabled=false \
            -ntp

      - name: Prepare build reports archive
        if: always()
        run: |
          7z a -tzip build-reports.zip -r \
              '**/target/*-reports/TEST-*.xml' \
              'target/build-report.json' \
              'LICENSE'

      - name: Upload build reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "build-reports-${{ github.run_attempt }}-persistence-jpa-${{ matrix.kind }}"
          path: build-reports.zip
          retention-days: 1

  build-report:
    runs-on: ubuntu-latest
    name: Build report
    needs: [persistence-jpa]
    if: always()
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: build-reports-artifacts
          pattern: build-reports-${{ github.run_attempt }}-*
          merge-multiple: true

      - name: Produce report and add it as job summary
        uses: quarkusio/action-build-reporter@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-reports-artifacts-path: build-reports-artifacts
