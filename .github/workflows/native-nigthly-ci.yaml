name: Native Compilation Nightly

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  native-build:
    name: Native Build (JDK 25)
    runs-on: ubuntu-latest
    outputs:
      build_outcome: ${{ steps.native-build.outcome }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - uses: actions/cache@v5
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama

      - name: Run llama3.2 model
        run: ollama run llama3.2

      - name: Build with Maven (Native, Mandrel on JDK 25, skip docs, single-threaded)
        id: native-build
        continue-on-error: true
        run: >
          mvn -B install -Dnative -ntp -pl '!docs'
          -Dquarkus.native.container-build
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-25
          -Dquarkus.langchain4j.timeout=60000
          -Dquarkus.langchain4j.ollama.chat-model.model-id=llama3.2
          -DskipITs=false

      - name: Publish Failed Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          check_name: "JUnit Test Report (Native Nightly)"
          report_paths: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
          include_passed: false
          detailed_summary: true
          annotate_only: true

      - name: Fail the workflow if native build failed
        if: steps.native-build.outcome == 'failure'
        run: exit 1

  track-issue:
    name: Track Issue
    needs: native-build
    if: always()
    uses: ./.github/workflows/issue-tracker.yml
    with:
      build_outcome: ${{ needs.native-build.outputs.build_outcome }}
      issue_label: 'native-nightly-ci'
      issue_title: '🔴 Native Compilation Failure'
      failure_description: 'Native compilation'
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      team_mention: '@quarkiverse/quarkiverse-flow-triage'