name: Native Compilation Nightly

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  # RestAssured socket timeout for slow GHA runners (in milliseconds)
  RESTASSURED_TIMEOUT_MS: 60000

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  native-build:
    name: Native Build (JDK 25)
    runs-on: ubuntu-latest
    outputs:
      build_outcome: ${{ steps.native-build.outcome }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - uses: actions/cache@v5
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama

      - name: Run llama3.2 model
        run: ollama run llama3.2

      - name: Build with Maven (Native, Mandrel on JDK 25, skip docs, single-threaded)
        id: native-build
        continue-on-error: true
        run: >
          mvn -B install -Dnative -ntp -pl '!docs'
          -Dquarkus.native.container-build
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-25
          -Dquarkus.langchain4j.timeout=60000
          -Dquarkus.langchain4j.ollama.chat-model.model-id=llama3.2
          -Drestassured.config.http.client.params.SO_TIMEOUT=${{ env.RESTASSURED_TIMEOUT_MS }}
          -DskipITs=false

      - name: Prepare build reports archive
        if: always()
        run: |
          7z a -tzip build-reports.zip -r \
              '**/target/*-reports/TEST-*.xml' \
              'target/build-report.json' \
              'LICENSE'

      - name: Upload build reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "build-reports-${{ github.run_attempt }}-native-build-jdk-25"
          path: build-reports.zip
          retention-days: 1

      - name: Fail the workflow if native build failed
        if: steps.native-build.outcome == 'failure'
        run: exit 1

  build-report:
    runs-on: ubuntu-latest
    name: Build report
    needs: [native-build]
    if: always()
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: build-reports-artifacts
          pattern: build-reports-${{ github.run_attempt }}-*
          merge-multiple: true

      - name: Produce report and add it as job summary
        uses: quarkusio/action-build-reporter@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-reports-artifacts-path: build-reports-artifacts

  track-issue:
    name: Track Issue
    needs: native-build
    if: always()
    uses: ./.github/workflows/issue-tracker.yml
    with:
      build_outcome: ${{ needs.native-build.outputs.build_outcome }}
      issue_label: 'native-nightly-ci'
      issue_title: '🔴 Native Compilation Failure'
      failure_description: 'Native compilation'
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      team_mention: '@quarkiverse/quarkiverse-flow-triage'