# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Core project - restrict Quarkus to patch updates only
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Allow only patch updates for Quarkus dependencies
    ignore:
      - dependency-name: "io.quarkus:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "io.quarkus.platform:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    # Group dependencies to reduce PR noise
    groups:
      quarkus:
        patterns:
          - "io.quarkus*"
        update-types:
          - "patch"
      langchain4j:
        patterns:
          - "io.quarkiverse.langchain4j:*"
          - "dev.langchain4j:*"
      serverlessworkflow:
        patterns:
          - "io.serverlessworkflow:*"
      test-dependencies:
        patterns:
          - "org.assertj:*"
          - "org.awaitility:*"
          - "org.junit*"
          - "io.rest-assured:*"
          - "org.wiremock:*"
          - "org.mockito:*"

  # Examples - allow all Quarkus updates (major/minor/patch)
  - package-ecosystem: "maven"
    directory: "/examples"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      quarkus:
        patterns:
          - "io.quarkus*"

  - package-ecosystem: "docker"
    directory: "/runner/app"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"