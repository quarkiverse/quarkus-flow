# Application
quarkus.application.name=resilient-task-orchestrator

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.acme.orchestrator".level=INFO

# Task execution configuration
orchestrator.task.failure-rate=0.3
orchestrator.task.delay-ms=100

# Messaging configuration (uses Quarkus Dev Services for Kafka in dev mode)
# Task events are exchanged via Kafka for fault isolation and resume support

# Coordinator workflow publishes to flow-out
mp.messaging.outgoing.flow-out.connector=smallrye-kafka
mp.messaging.outgoing.flow-out.topic=orchestrator-events
mp.messaging.outgoing.flow-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Task workflow listens on flow-in
mp.messaging.incoming.flow-in.connector=smallrye-kafka
mp.messaging.incoming.flow-in.topic=orchestrator-events
mp.messaging.incoming.flow-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.flow-in.auto.offset.reset=earliest

# Dev mode
%dev.quarkus.http.port=8080
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
