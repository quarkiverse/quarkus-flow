quarkus.http.test-port=0

quarkus.langchain4j.ollama.devservices.enabled=false

# Ensure Kafka consumers read missed messages during fast test execution
mp.messaging.incoming.flow-in.auto.offset.reset=earliest
mp.messaging.outcoming.flow-out.auto.offset.reset=earliest

quarkus.log.category."io.quarkiverse.flow".level=WARN
# Enabled it to increase tracing
quarkus.flow.tracing.enabled=false
