quarkus.http.test-port=0

# Disable Ollama dev services (we use WireMock for tests)
quarkus.langchain4j.devservices.enabled=false

# Use in-memory chat model for tests (no real LLM calls)
quarkus.langchain4j.ollama.chat-model.model-id=test-model

# Kafka test configuration (Dev Services will override)
quarkus.kafka.devservices.enabled=true
quarkus.kafka.devservices.topic-partitions.car-returns=1
quarkus.kafka.devservices.topic-partitions.car-processed=1

# Flow messaging
quarkus.flow.messaging.defaults-enabled=true
mp.messaging.incoming.flow-in.connector=smallrye-kafka
mp.messaging.incoming.flow-in.topic=car-returns
mp.messaging.outgoing.flow-out.connector=smallrye-kafka
mp.messaging.outgoing.flow-out.topic=car-processed
mp.messaging.outgoing.car-returns.connector=smallrye-kafka
mp.messaging.outgoing.car-returns.topic=car-returns

# Serialization configuration
mp.messaging.incoming.flow-in.value.deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
mp.messaging.outgoing.flow-out.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer
mp.messaging.outgoing.car-returns.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer
mp.messaging.outgoing.car-returns.key.serializer=org.apache.kafka.common.serialization.IntegerSerializer

# Logging for debugging
quarkus.log.category."io.quarkiverse.flow".level=DEBUG
quarkus.log.category."com.carmanagement".level=DEBUG
