quarkus.application.name=workshop-phase1-events

# Kafka Messaging
quarkus.flow.messaging.defaults-enabled=true
mp.messaging.incoming.flow-in.connector=smallrye-kafka
mp.messaging.incoming.flow-in.topic=car-returns
mp.messaging.incoming.flow-in.auto.offset.reset=earliest
mp.messaging.outgoing.flow-out.connector=smallrye-kafka
mp.messaging.outgoing.flow-out.topic=car-processed

# Additional Kafka channel for REST resource
mp.messaging.outgoing.car-returns.connector=smallrye-kafka
mp.messaging.outgoing.car-returns.topic=car-returns
mp.messaging.outgoing.car-returns.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.car-returns.key.serializer=org.apache.kafka.common.serialization.IntegerSerializer

# Ollama LLM
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2
quarkus.langchain4j.ollama.timeout=60s

# Logging
quarkus.log.category."io.quarkiverse.flow".level=INFO
quarkus.log.category."com.carmanagement".level=INFO
quarkus.log.category."dev.langchain4j".level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
