# Quarkus Flow Runner Configuration
quarkus.flow.runner.enabled=true
# In dev mode: use source directory. In test/prod: use classpath
%dev.quarkus.flow.runner.source.path=src/main/resources/workflows
%test.quarkus.flow.runner.source.path=src/main/resources/workflows
%prod.quarkus.flow.runner.source.path=/deployments/workflows

# Security - API Key mode for demo
quarkus.flow.runner.security.type=api-key
quarkus.flow.runner.security.api-keys.demo.secret=${FLOW_API_KEY:demo-secret-change-me}
quarkus.flow.runner.security.api-keys.demo.roles=flow-admin

# Application
quarkus.application.name=greeting-runner
